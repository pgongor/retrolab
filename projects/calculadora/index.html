<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>calculadora.exe</title>

  <!-- Estilo global -->
  <link rel="stylesheet" href="../../style.css">

  <!-- Estilo específico -->
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <main class="screen">
    <header>
      <h1>CALCULADORA v0.1</h1>
    </header>

    <section class="calculator">

      <div class="display">0</div>

        <div class="buttons">

          <button>C</button>
          <button>DEL</button>
          <button>/</button>
          <button>*</button>

          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>-</button>

          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>+</button>

          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>=</button>

          <button class="span-2">0</button>
          <button class="span-2">.</button>

        </div>

    </section>

    <footer>
      <p><a href="../../index.html">< BACK</a></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
